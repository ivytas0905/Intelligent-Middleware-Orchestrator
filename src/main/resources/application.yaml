spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/imo_db
    username: imo_user
    password: imo_pass
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
       max-file-size:10MB
       max-request-size:10MB

langchain4j:
  open-ai:
    chat-model:
       api-key: ${OPENAI_API_KEY}
       model-name: gpt-4o-mini
       temperature: 0.0
       log-requests: true
       log-responses: true

imo:
  rag:
     chunk-size: 800
     chunk-overlap: 150
     max-results: 4
     min-score: 0.5

cat src/main/resources/application.yaml | grep api-key